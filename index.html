<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wada Colour Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ──────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#f5f3ef;--cream2:#eeeae3;--cream3:#e4e0d8;
  --ink:#1a1714;--ink2:#3d3a36;--ink3:#7a7369;
  --line:rgba(26,23,20,0.09);--line2:rgba(26,23,20,0.06);
  --red:#b5173a;--red2:#8f1230;
  --white:#ffffff;
  --nav-h:64px;--header-h:52px;
}
html,body{height:100%;overflow:hidden;background:#ddd8d0}
body{font-family:'Tenor Sans',sans-serif;display:flex;align-items:center;justify-content:center}

/* ── PHONE SHELL ──────────────────────────────────────────── */
.phone{
  width:390px;height:844px;
  background:var(--cream);
  border-radius:44px;
  box-shadow:0 32px 80px rgba(0,0,0,0.22),0 0 0 1px rgba(0,0,0,0.1),inset 0 0 0 1px rgba(255,255,255,0.15);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}

/* Notch */
.phone::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:120px;height:34px;background:var(--cream);
  border-radius:0 0 20px 20px;z-index:100;
}
.phone::after{
  content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:80px;height:14px;background:var(--ink);
  border-radius:8px;z-index:101;
}

/* Status bar */
.status-bar{
  height:44px;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 28px 6px;font-size:11px;font-weight:600;color:var(--ink);
  flex-shrink:0;position:relative;z-index:10;
}

/* ── HEADER ────────────────────────────────────────────────── */
.app-header{
  height:var(--header-h);display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;
  border-bottom:1px solid var(--line);flex-shrink:0;
  background:var(--cream);position:relative;z-index:20;
}
.logo{text-align:center}
.logo-w{font-family:'Playfair Display',serif;font-size:1.1rem;letter-spacing:0.12em;color:var(--ink)}
.logo-s{display:block;font-size:7px;letter-spacing:0.4em;text-transform:uppercase;color:var(--ink3);margin-top:-1px}
.header-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink3);cursor:pointer}
.saved-badge{position:relative}
.saved-badge-count{
  position:absolute;top:-3px;right:-3px;
  width:14px;height:14px;background:var(--red);color:white;
  border-radius:50%;font-size:7px;display:flex;align-items:center;justify-content:center;
  font-family:'Tenor Sans',sans-serif;
}

/* ── SCREENS ───────────────────────────────────────────────── */
.screens{flex:1;overflow:hidden;position:relative}
.screen{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;
  transform:translateX(20px);
  transition:opacity 0.25s,transform 0.25s;
}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0)}
.screen.slide-left{transform:translateX(-20px)}

/* ── BOTTOM NAV ────────────────────────────────────────────── */
.bottom-nav{
  height:var(--nav-h);display:flex;
  border-top:1px solid var(--line);
  background:rgba(245,243,239,0.97);
  backdrop-filter:blur(12px);flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.bn-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  cursor:pointer;color:var(--ink3);transition:color 0.2s;
}
.bn-item.active{color:var(--ink)}
.bn-icon{font-size:20px;line-height:1;transition:transform 0.2s}
.bn-item.active .bn-icon{transform:scale(1.1)}
.bn-label{font-size:7px;letter-spacing:0.14em;text-transform:uppercase}
.bn-center{
  background:var(--ink);border-radius:18px;margin:8px 6px;
  color:var(--cream)!important;
}
.bn-center .bn-label{color:rgba(245,243,239,0.7)}

/* ── HOME SCREEN ───────────────────────────────────────────── */
.home-screen{padding:0 0 16px}
.section-eyebrow{
  font-size:7px;letter-spacing:0.32em;text-transform:uppercase;
  color:var(--ink3);display:block;padding:14px 20px 6px;
}

/* Daily combo hero */
.daily-hero{margin:0 16px;border-radius:14px;overflow:hidden;cursor:pointer}
.daily-swatches{display:flex;height:130px;gap:1px;background:var(--line)}
.daily-swatch{
  flex:1;display:flex;flex-direction:column;
  justify-content:flex-end;padding:8px 7px;
  transition:flex 0.35s cubic-bezier(0.16,1,0.3,1);cursor:pointer;
}
.daily-swatch:hover{flex:1.6}
.ds-name{font-family:'Playfair Display',serif;font-style:italic;font-size:10px;line-height:1.2;word-break:break-word}
.ds-num{font-size:7px;opacity:0.65;margin-top:2px;font-family:'Tenor Sans',sans-serif;letter-spacing:0.05em}
.daily-footer{
  background:var(--white);padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.df-left{}
.df-eyebrow{font-size:7px;letter-spacing:0.25em;text-transform:uppercase;color:var(--red)}
.df-names{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:var(--ink2)}
.df-arrow{
  width:28px;height:28px;border-radius:50%;background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--cream);cursor:pointer;flex-shrink:0;
}

/* Quick access */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px}
.quick-card{
  background:var(--white);border-radius:12px;padding:12px 10px;
  cursor:pointer;transition:all 0.15s;
  border:1px solid var(--line2);
  display:flex;flex-direction:column;gap:4px;
}
.quick-card:active{transform:scale(0.96);background:var(--cream2)}
.qc-icon{font-size:18px;line-height:1}
.qc-label{font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink)}
.qc-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:9px;color:var(--ink3)}

/* Season strip */
.season-card{
  margin:0 16px;background:var(--white);border-radius:12px;
  border:1px solid var(--line2);overflow:hidden;
}
.season-header{padding:10px 14px 8px;display:flex;align-items:baseline;justify-content:space-between}
.sh-tag{font-size:7px;letter-spacing:0.25em;text-transform:uppercase;color:var(--red)}
.sh-title{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:var(--ink)}
.season-swatches-row{display:flex;height:36px;gap:1px}
.season-sw{flex:1;cursor:pointer;transition:transform 0.2s;position:relative}
.season-sw:hover{transform:scaleY(1.1);z-index:2}
.season-labels{padding:6px 14px;display:flex;gap:8px;overflow-x:auto}
.season-label-item{font-size:8px;color:var(--ink3);font-family:'Playfair Display',serif;font-style:italic;white-space:nowrap}

/* ── ARCHIVO SCREEN ────────────────────────────────────────── */
.archivo-screen{}
.archivo-search-bar{padding:10px 16px;position:relative}
.archivo-search-bar input{
  width:100%;font-family:'Playfair Display',serif;font-style:italic;
  font-size:13px;background:var(--white);border:1px solid var(--line);
  border-radius:10px;padding:9px 12px 9px 32px;
  color:var(--ink);outline:none;
}
.archivo-search-bar input::placeholder{color:var(--ink3)}
.search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:12px}
.family-pills{display:flex;gap:4px;padding:0 16px 10px;overflow-x:auto}
.family-pills::-webkit-scrollbar{display:none}
.fam-pill{
  flex-shrink:0;padding:5px 12px;border-radius:20px;
  font-size:8px;letter-spacing:0.12em;text-transform:uppercase;
  border:1px solid var(--line);color:var(--ink3);cursor:pointer;
  background:var(--white);transition:all 0.15s;
}
.fam-pill.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.color-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:2px;padding:0 16px;padding-bottom:16px;
}
.color-tile{border-radius:8px;overflow:hidden;cursor:pointer;transition:transform 0.15s}
.color-tile:active{transform:scale(0.93)}
.ct-swatch{height:56px}
.ct-body{background:var(--white);padding:5px 6px}
.ct-name{font-family:'Playfair Display',serif;font-style:italic;font-size:8px;color:var(--ink);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-count{font-size:7px;color:var(--red)}

/* ── COMBO SCREEN ──────────────────────────────────────────── */
.combo-screen{padding-bottom:16px}
.combo-back{
  display:flex;align-items:center;gap:10px;
  padding:12px 20px 10px;cursor:pointer;
}
.back-arrow{font-size:20px;color:var(--ink3)}
.combo-back-label{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3)}
.combo-swatches-big{
  display:flex;height:210px;margin:0 16px;
  border-radius:14px;overflow:hidden;gap:1px;background:var(--line);
}
.csb{
  flex:1;display:flex;flex-direction:column;justify-content:flex-end;
  padding:10px 8px;cursor:pointer;
  transition:flex 0.35s cubic-bezier(0.16,1,0.3,1);
}
.csb:hover{flex:1.7}
.csb-name{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;line-height:1.2}
.csb-hex{font-size:8px;opacity:0.7;margin-top:3px;letter-spacing:0.05em}
.combo-meta{margin:10px 16px 0}
.combo-num{font-size:7px;letter-spacing:0.28em;text-transform:uppercase;color:var(--red);display:block;margin-bottom:3px}
.combo-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:400;color:var(--ink)}
.color-list{margin:10px 16px;background:var(--white);border-radius:12px;overflow:hidden;border:1px solid var(--line2)}
.cl-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-bottom:1px solid var(--line2);cursor:pointer;
  transition:background 0.15s;
}
.cl-row:last-child{border:none}
.cl-row:active{background:var(--cream2)}
.cl-dot{width:28px;height:28px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,0.06)}
.cl-name{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:var(--ink);flex:1}
.cl-cmyk{font-size:8px;color:var(--ink3);font-family:monospace;letter-spacing:0.02em}
.related-section{padding:0 16px}
.related-eyebrow{font-size:7px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:8px}
.related-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px}
.related-scroll::-webkit-scrollbar{display:none}
.rel-thumb{
  flex-shrink:0;width:58px;height:58px;border-radius:10px;overflow:hidden;
  display:flex;cursor:pointer;border:1px solid var(--line2);
  transition:transform 0.2s;
}
.rel-thumb:active{transform:scale(0.92)}
.rel-thumb div{flex:1}
.combo-actions{display:flex;gap:6px;padding:12px 16px 0}
.ca-btn{
  flex:1;padding:11px 6px;font-size:8px;letter-spacing:0.18em;
  text-transform:uppercase;border:1px solid var(--line);
  background:none;color:var(--ink3);cursor:pointer;border-radius:10px;
  transition:all 0.15s;font-family:'Tenor Sans',sans-serif;
}
.ca-btn:active{background:var(--cream2)}
.ca-btn.primary{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.ca-btn.primary:active{background:var(--red)}

/* ── INSPO SCREEN ──────────────────────────────────────────── */
.inspo-screen{padding-bottom:16px}
.inspo-pills{display:flex;gap:4px;padding:10px 16px;overflow-x:auto}
.inspo-pills::-webkit-scrollbar{display:none}
.inspo-pill{
  flex-shrink:0;padding:5px 12px;border-radius:20px;
  font-size:8px;letter-spacing:0.12em;text-transform:uppercase;
  border:1px solid var(--line);color:var(--ink3);cursor:pointer;
  background:var(--white);transition:all 0.15s;
}
.inspo-pill.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.inspo-masonry{
  columns:2;column-gap:4px;padding:0 16px;
}
.inspo-card{
  break-inside:avoid;margin-bottom:4px;border-radius:12px;overflow:hidden;
  cursor:pointer;transition:transform 0.2s;background:var(--white);
}
.inspo-card:active{transform:scale(0.97)}
.ic-swatches{display:flex;gap:1px}
.ic-swatch{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 5px}
.ic-swatch-name{font-family:'Playfair Display',serif;font-style:italic;font-size:8px;line-height:1.1}
.ic-body{padding:7px 8px}
.ic-title{font-family:'Playfair Display',serif;font-style:italic;font-size:10px;color:var(--ink);display:block}
.ic-tag{font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:var(--red)}

/* ── GUARDADOS SCREEN ──────────────────────────────────────── */
.saved-screen{padding:0 16px 16px}
.saved-empty{text-align:center;padding:4rem 2rem;font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--ink3)}
.saved-item{
  background:var(--white);border-radius:12px;border:1px solid var(--line2);
  margin-bottom:6px;overflow:hidden;cursor:pointer;display:flex;
  transition:all 0.15s;
}
.saved-item:active{opacity:0.8}
.saved-swatches{display:flex;width:80px;flex-shrink:0}
.saved-swatches div{flex:1}
.saved-info{padding:10px 12px;flex:1;border-left:1px solid var(--line2)}
.saved-label{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:var(--ink);display:block}
.saved-sub{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3)}
.saved-del{width:36px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3);border-left:1px solid var(--line2)}

/* ── OCASION SCREEN ────────────────────────────────────────── */
.ocasion-screen{padding:0 16px 16px}
.oc-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px}
.oc-card{
  background:var(--white);border-radius:12px;overflow:hidden;
  cursor:pointer;transition:all 0.15s;border:1px solid var(--line2);
}
.oc-card:active{transform:scale(0.97)}
.oc-swatches{display:flex;height:56px}
.oc-swatches div{flex:1}
.oc-body{padding:8px 10px}
.oc-name{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:var(--ink);display:block}
.oc-desc{font-size:7px;letter-spacing:0.05em;color:var(--ink3)}
.oc-results{margin-top:8px}
.oc-results-title{font-size:7px;letter-spacing:0.28em;text-transform:uppercase;color:var(--red);display:block;margin-bottom:8px}
.oc-result-row{
  display:flex;margin-bottom:4px;border-radius:10px;overflow:hidden;
  background:var(--white);border:1px solid var(--line2);cursor:pointer;
  transition:background 0.15s;
}
.oc-result-row:active{background:var(--cream2)}
.oc-result-swatches{display:flex;width:72px;flex-shrink:0}
.oc-result-swatches div{flex:1;min-height:48px}
.oc-result-info{padding:8px 10px;border-left:1px solid var(--line2);flex:1}
.oc-result-num{font-size:7px;letter-spacing:0.2em;text-transform:uppercase;color:var(--red)}
.oc-result-names{font-family:'Playfair Display',serif;font-style:italic;font-size:9px;color:var(--ink);line-height:1.4}

/* Toast */
.toast{
  position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--ink);color:var(--cream);z-index:500;
  font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  padding:8px 16px;border-radius:20px;opacity:0;
  transition:all 0.3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Scrollbar hide */
.screen::-webkit-scrollbar{display:none}
.screen{-ms-overflow-style:none;scrollbar-width:none}
</style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span>9:41</span>
    <span style="font-size:13px">●●●</span>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-icon" onclick="showScreen('archivo')">◈</div>
    <div class="logo">
      <span class="logo-w">Wada</span>
      <span class="logo-s">Colour Intelligence</span>
    </div>
    <div class="header-icon saved-badge" onclick="showScreen('saved')">
      ♡
      <span class="saved-badge-count" id="savedCount">0</span>
    </div>
  </header>

  <!-- Screens -->
  <div class="screens">

    <!-- HOME -->
    <div class="screen active" id="screen-home">
      <div class="home-screen">
        <span class="section-eyebrow">Combinación del día</span>
        <div class="daily-hero" id="dailyHero" onclick="openDailyFromHome()"></div>

        <span class="section-eyebrow" style="margin-top:4px">Explorar</span>
        <div class="quick-grid">
          <div class="quick-card" onclick="showScreen('archivo')">
            <span class="qc-icon">◈</span>
            <div class="qc-label">Archivo</div>
            <div class="qc-sub">157 colores</div>
          </div>
          <div class="quick-card" onclick="showScreen('ocasion')">
            <span class="qc-icon">✦</span>
            <div class="qc-label">Ocasión</div>
            <div class="qc-sub">12 estilos</div>
          </div>
          <div class="quick-card" onclick="showScreen('inspo')">
            <span class="qc-icon">◉</span>
            <div class="qc-label">Inspo</div>
            <div class="qc-sub">35 looks</div>
          </div>
        </div>

        <span class="section-eyebrow">FW 2025 · Pasarela</span>
        <div class="season-card" id="seasonCard"></div>
      </div>
    </div>

    <!-- ARCHIVO -->
    <div class="screen" id="screen-archivo">
      <div class="archivo-screen">
        <div class="archivo-search-bar">
          <span class="search-icon">◈</span>
          <input type="text" id="archivoSearch" placeholder="Buscar color…" oninput="filterArchivo()">
        </div>
        <div class="family-pills" id="familyPills"></div>
        <div class="color-grid" id="colorGrid"></div>
      </div>
    </div>

    <!-- COMBO -->
    <div class="screen" id="screen-combo">
      <div class="combo-screen" id="comboContent"></div>
    </div>

    <!-- INSPO -->
    <div class="screen" id="screen-inspo">
      <div class="inspo-screen">
        <div class="inspo-pills" id="inspoPills"></div>
        <div class="inspo-masonry" id="inspoMasonry"></div>
      </div>
    </div>

    <!-- OCASION -->
    <div class="screen" id="screen-ocasion">
      <div class="ocasion-screen" id="ocasionContent">
        <span class="section-eyebrow" style="padding:14px 0 8px">¿Para qué ocasión?</span>
        <div class="oc-grid" id="ocGrid"></div>
        <div class="oc-results" id="ocResults" style="display:none"></div>
      </div>
    </div>

    <!-- SAVED -->
    <div class="screen" id="screen-saved">
      <div class="saved-screen">
        <span class="section-eyebrow">Guardados</span>
        <div id="savedList"></div>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bn-item active" id="bn-home" onclick="showScreen('home')">
      <span class="bn-icon">⌂</span>
      <span class="bn-label">Inicio</span>
    </div>
    <div class="bn-item" id="bn-archivo" onclick="showScreen('archivo')">
      <span class="bn-icon">◈</span>
      <span class="bn-label">Archivo</span>
    </div>
    <div class="bn-item bn-center" id="bn-inspo" onclick="showScreen('inspo')">
      <span class="bn-icon">◉</span>
      <span class="bn-label">Inspo</span>
    </div>
    <div class="bn-item" id="bn-ocasion" onclick="showScreen('ocasion')">
      <span class="bn-icon">✦</span>
      <span class="bn-label">Ocasión</span>
    </div>
    <div class="bn-item" id="bn-saved" onclick="showScreen('saved')">
      <span class="bn-icon">♡</span>
      <span class="bn-label">Guardados</span>
    </div>
  </nav>

  <div class="toast" id="toast"></div>

  const n=savedItems.length;

// ── NAVIGATION ─────────────────────────────────────────────────
function showScreen(name,fromCombo){
  // Deactivate old
  document.getElementById('screen-'+currentScreen).classList.remove('active');
  if(currentScreen!==name)document.getElementById('screen-'+currentScreen).classList.add('slide-left');
  setTimeout(()=>{
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('slide-left'));
  },250);

  prevScreen=currentScreen;
  currentScreen=name;

  // Activate new
  const el=document.getElementById('screen-'+name);
  el.classList.remove('slide-left');
  el.classList.add('active');
  el.scrollTop=0;

  // Update bottom nav
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  const bn=document.getElementById('bn-'+name);
  if(bn)bn.classList.add('active');

  // Lazy render
  if(name==='archivo')renderArchivo();
  if(name==='inspo')renderInspo();
  if(name==='ocasion')renderOcasion();
  if(name==='saved')renderSaved();
}

function goBack(){showScreen(prevScreen==='combo'?'home':prevScreen)}

// ── HELPERS ────────────────────────────────────────────────────
function lum(rgb){return 0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2]}
function tc(rgb){return lum(rgb)>140?'rgba(0,0,0,0.75)':'rgba(255,255,255,0.92)'}
function tcHex(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return lum([r,g,b])>140?'rgba(0,0,0,0.75)':'rgba(255,255,255,0.92)'}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

const SEASON_COLORS=[
  {idx:50,name:'Mocha Mousse'},{idx:29,name:'Bordeaux'},
  {idx:79,name:'Forest Floor'},{idx:128,name:'Inkwell'},
  {idx:76,name:'Dusty Olive'},{idx:54,name:'Warm Taupe'},
];

function buildHome(){
  // Daily combo
  const day=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
  const allC=Object.entries(COMBOS);
  const[cn,idxs]=allC[day%allC.length];
  dailyComboNum=parseInt(cn);
  const cols=idxs.map(i=>colorByIndex[i]).filter(Boolean);
  if(!cols.length)return;

  const swatches=cols.map(c=>`
    <div class="daily-swatch" style="background:${c.hex}">
      <span class="ds-name" style="color:${tc(c.rgb)}">${c.name}</span>
    </div>`).join('');

  document.getElementById('dailyHero').innerHTML=`
    <div class="daily-swatches">${swatches}</div>
    <div class="daily-footer">
      <div class="df-left">
        <div class="df-eyebrow">Combinación del día · #${cn}</div>
        <div class="df-names">${cols.map(c=>c.name).join(' · ')}</div>
      </div>
      <div class="df-arrow">→</div>
    </div>`;

  // Season
  const sColors=SEASON_COLORS.map(s=>colorByIndex[s.idx]).filter(Boolean);
  const sSw=sColors.map(c=>`<div class="season-sw" style="background:${c.hex}" title="${c.name}"></div>`).join('');
  const sLabels=sColors.map(c=>`<span class="season-label-item">${c.name}</span>`).join('');
  document.getElementById('seasonCard').innerHTML=`
    <div class="season-header">
      <span class="sh-tag">FW 2025</span>
      <span class="sh-title">Paleta de temporada</span>
    </div>
    <div class="season-swatches-row">${sSw}</div>
    <div class="season-labels">${sLabels}</div>`;
}

function openDailyFromHome(){
  if(dailyComboNum)openCombo(dailyComboNum,'home');
}

// ── COMBO ──────────────────────────────────────────────────────
function openCombo(cn,from){
  const idxs=COMBOS[cn]||[];
  const cols=idxs.map(i=>colorByIndex[i]).filter(Boolean);
  if(!cols.length)return;
  prevScreen=from||currentScreen;

  const swatches=cols.map(c=>`
    <div class="csb" style="background:${c.hex}">
      <span class="csb-name" style="color:${tc(c.rgb)}">${c.name}</span>
      <span class="csb-hex" style="color:${tc(c.rgb)}">${c.hex}</span>
    </div>`).join('');

  const colorRows=cols.map(c=>`
    <div class="cl-row" onclick="openComboFromColor(${c.index})">
      <div class="cl-dot" style="background:${c.hex}"></div>
      <span class="cl-name">${c.name}</span>
      <span class="cl-cmyk">${c.cmyk}</span>
    </div>`).join('');

  // Related combos
  const relSet=new Set();
  cols.forEach(c=>c.combinations.forEach(n=>{if(n!==cn)relSet.add(n)}));
  const relThumbs=[...relSet].slice(0,10).map(n=>{
    const rCols=(COMBOS[n]||[]).map(i=>colorByIndex[i]).filter(Boolean);
    const rSw=rCols.map(c=>`<div style="background:${c.hex}"></div>`).join('');
    return`<div class="rel-thumb" onclick="openCombo(${n},'combo')">${rSw}</div>`;
  }).join('');

  const isSaved=savedItems.some(s=>s.comboNum===cn);

  document.getElementById('comboContent').innerHTML=`
    <div class="combo-back" onclick="goBack()">
      <span class="back-arrow">←</span>
      <span class="combo-back-label">Volver</span>
    </div>
    <div class="combo-swatches-big">${swatches}</div>
    <div class="combo-meta">
      <span class="combo-num">Combinación #${cn}</span>
      <div class="combo-title">${cols.map(c=>c.name).join(' · ')}</div>
    </div>
    <div class="color-list">${colorRows}</div>
    ${relThumbs?`<div class="related-section"><span class="related-eyebrow">Combinaciones relacionadas</span><div class="related-scroll">${relThumbs}</div></div>`:''}
    <div class="combo-actions">
      <button class="ca-btn" id="saveBtn-${cn}" onclick="toggleSave(${cn})">${isSaved?'♡ Guardado':'♡ Guardar'}</button>
      <button class="ca-btn" onclick="shareCombo(${cn})">↗ Compartir</button>
    </div>`;

  showScreen('combo');
}

function openComboFromColor(idx){
  const c=colorByIndex[idx];if(!c||!c.combinations.length)return;
  openCombo(c.combinations[0],'combo');
}

function toggleSave(cn){
  const idxs=COMBOS[cn]||[];
  const cols=idxs.map(i=>colorByIndex[i]).filter(Boolean);
  const exists=savedItems.findIndex(s=>s.comboNum===cn);
  if(exists>=0){
    savedItems.splice(exists,1);
    showToast('Eliminado de guardados');
  } else {
    savedItems.push({id:Date.now(),comboNum:cn,colors:cols,label:cols.map(c=>c.name).join(' · ')});
    showToast('Guardado ✦');
  }
  saveStorage();updateSavedCount();
  const btn=document.getElementById('saveBtn-'+cn);
  if(btn)btn.textContent=savedItems.some(s=>s.comboNum===cn)?'♡ Guardado':'♡ Guardar';
}

function shareCombo(cn){
  const cols=(COMBOS[cn]||[]).map(i=>colorByIndex[i]).filter(Boolean);
  const text=`✦ Combinación Wada #${cn}\n${cols.map(c=>c.name+' '+c.hex).join('\n')}\n\nsanzo-wada-pi.vercel.app`;
  if(navigator.share)navigator.share({title:'Wada #'+cn,text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(()=>showToast('Copiado ✦')).catch(()=>showToast('¡Compartido!'));
}

  buildFamilyPills();

    colors=colors.filter(c=>c.index>=a&&c.index<=b);

  if(archivoSearch)colors=colors.filter(c=>c.name.toLowerCase().includes(archivoSearch));

  document.getElementById('colorGrid').innerHTML=colors.map(c=>`

  {id:'electronica',name:'Electrónica',desc:'Neón y contraste',idxs:[92,55,9,141]},
  {id:'trajes',name:'Trajes',desc:'Sastrería clásica',idxs:[128,156,54,86]},
  {id:'oversized',name:'Oversized',desc:'Holgado urbano',idxs:[157,153,54,128]},
  {id:'boda',name:'Boda invitada',desc:'Pasteles elegantes',idxs:[3,133,110,43]},
  {id:'casual',name:'Casual',desc:'Del día a día',idxs:[50,54,88,76]},
  {id:'editorial',name:'Editorial',desc:'Statement total',idxs:[157,17,55,35]},
  {id:'playa',name:'Playa',desc:'Resort y verano',idxs:[109,110,55,152]},
  {id:'noche',name:'Noche',desc:'Glamour nocturno',idxs:[157,29,22,148]},
  {id:'sport',name:'Sport Chic',desc:'Del gym a la calle',idxs:[157,120,92,55]},
  {id:'boho',name:'Boho',desc:'Texturas naturales',idxs:[50,45,14,59]},
  {id:'corporate',name:'Corporate',desc:'Profesional',idxs:[156,128,125,54]},
];

function renderOcasion(){
  document.getElementById('ocGrid').innerHTML=OCASIONES.map(o=>{
    const cols=o.idxs.map(i=>colorByIndex[i]).filter(Boolean);
    const sw=cols.map(c=>`<div style="background:${c.hex}"></div>`).join('');
    return`<div class="oc-card" onclick="showOcasionResults('${o.id}')">
      <div class="oc-swatches">${sw}</div>
      <div class="oc-body">
        <span class="oc-name">${o.name}</span>
        <span class="oc-desc">${o.desc}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('ocResults').style.display='none';
}

function showOcasionResults(id){
  const oc=OCASIONES.find(o=>o.id===id);if(!oc)return;
  const rel=new Set(oc.idxs);
  const scored=[];
  Object.entries(COMBOS).forEach(([cn,idxs])=>{
    const score=idxs.filter(i=>rel.has(i)).length;
    if(score>0)scored.push({cn,idxs,score});
  });
  scored.sort((a,b)=>b.score-a.score);

  const rows=scored.slice(0,12).map(({cn,idxs})=>{
    const cols=idxs.map(i=>colorByIndex[i]).filter(Boolean);
    const sw=cols.map(c=>`<div style="background:${c.hex}"></div>`).join('');
    return`<div class="oc-result-row" onclick="openCombo(${cn},'ocasion')">
      <div class="oc-result-swatches">${sw}</div>
      <div class="oc-result-info">
        <span class="oc-result-num">#${cn}</span>
        <span class="oc-result-names">${cols.map(c=>c.name).join(' · ')}</span>
      </div>
    </div>`;
  }).join('');

  const res=document.getElementById('ocResults');
  res.style.display='block';
  res.innerHTML=`<span class="oc-results-title">${oc.name} · ${scored.length} combinaciones</span>${rows}`;
  res.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── SAVED ──────────────────────────────────────────────────────
function renderSaved(){
  const el=document.getElementById('savedList');
  if(!savedItems.length){
    el.innerHTML='<div class="saved-empty">Todavía no guardaste ninguna combinación.<br><br>Explorá el Archivo y tocá ♡ Guardar.</div>';
    return;
  }
  el.innerHTML=savedItems.slice().reverse().map(item=>{
    const sw=item.colors.slice(0,4).map(c=>`<div style="background:${c.hex};flex:1;min-height:52px"></div>`).join('');
    return`<div class="saved-item" onclick="openCombo(${item.comboNum},'saved')">
      <div class="saved-swatches">${sw}</div>
      <div class="saved-info">
        <span class="saved-label">${item.label}</span>
        <span class="saved-sub">Combinación #${item.comboNum}</span>
      </div>
      <div class="saved-del" onclick="deleteSaved(${item.id},event)">✕</div>
    </div>`;
  }).join('');
}

function deleteSaved(id,e){
  e.stopPropagation();
  savedItems=savedItems.filter(s=>s.id!==id);
  saveStorage();updateSavedCount();renderSaved();
  showToast('Eliminado');
}

// ── INIT ───────────────────────────────────────────────────────
buildHome();
updateSavedCount();
</script>
